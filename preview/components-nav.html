<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:#fff;margin:0;padding:0;font-family:var(--sl-font-sans);}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--sl-border);background:rgba(255,255,255,.92);backdrop-filter:blur(12px);}
.left{display:flex;align-items:center;gap:32px;}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;color:var(--sl-navy-900);font-size:18px;}
.mark{width:26px;height:26px;}
.menu{display:flex;gap:22px;font-size:14px;font-weight:500;color:var(--sl-fg-muted);}
.menu a{text-decoration:none;color:inherit;}
.menu a.active{color:var(--sl-fg);font-weight:600;}
.right{display:flex;gap:10px;align-items:center;}
.btn{font:inherit;font-weight:600;font-size:13px;padding:9px 16px;border-radius:10px;border:1px solid transparent;cursor:pointer;}
.ghost{background:transparent;color:var(--sl-fg);}
.primary{background:var(--sl-accent);color:#fff;}
</style></head>
<body>
<nav class="nav">
  <div class="left">
    <div class="brand"><img src="../assets/logo-full.png" alt="SafetyLink" height="26"/></div>
    <div class="menu"><a class="active">Platform</a><a>Industries</a><a>Experts</a><a>Pricing</a><a>Resources</a></div>
  </div>
  <div class="right">
    <button class="btn ghost">Sign in</button>
    <button class="btn primary">Get a demo</button>
  </div>
</nav>
</body></html>
