<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0;padding:0;font-family:var(--sl-font-sans);}
.hero{position:relative;height:240px;border-radius:14px;overflow:hidden;background:linear-gradient(180deg,#14375B,#0B2238);display:flex;align-items:center;justify-content:center;}
.hero::before{content:"";position:absolute;inset:0;background-image:url(../assets/mark-tile.png);background-size:200px 200px;background-repeat:repeat;opacity:.09;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sl-green-400);}
.t{position:relative;text-align:center;color:#fff;padding:0 24px;}
.t h1{font-size:34px;font-weight:800;margin:8px 0 6px;letter-spacing:-.02em;line-height:1.1;text-wrap:balance;}
.t p{margin:0;font-size:14px;color:rgba(255,255,255,.78);max-width:440px;}
</style></head>
<body style="padding:24px;">
<div class="hero">
  <div class="t">
    <span class="eyebrow">Why SafetyLink</span>
    <h1>Compliance, made human.</h1>
    <p>Marks set in a roomy tile and dropped to ~9% opacity — just enough to register as brand texture without competing with the headline.</p>
  </div>
</div>
</body></html>
