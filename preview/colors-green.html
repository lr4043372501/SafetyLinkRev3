<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0;padding:24px;}</style></head>
<body>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;font-family:var(--sl-font-sans);">
  <div style="aspect-ratio:1.4;background:var(--sl-green-900);border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;">
    <span style="font-size:11px;opacity:.85;letter-spacing:.06em;text-transform:uppercase;">green 900</span>
    <span style="font-family:var(--sl-font-mono);font-size:12px;">#0F5E1D</span>
  </div>
  <div style="aspect-ratio:1.4;background:var(--sl-green-700);border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;">
    <span style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;">green 700</span>
    <span style="font-family:var(--sl-font-mono);font-size:12px;">#1FA12F</span>
  </div>
  <div style="aspect-ratio:1.4;background:var(--sl-green-600);border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;">
    <span style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;">green 600 · accent</span>
    <span style="font-family:var(--sl-font-mono);font-size:12px;">#28B432</span>
  </div>
  <div style="aspect-ratio:1.4;background:var(--sl-green-300);border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;color:var(--sl-green-900);">
    <span style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;">green 300</span>
    <span style="font-family:var(--sl-font-mono);font-size:12px;">#A4E5A8</span>
  </div>
  <div style="aspect-ratio:1.4;background:var(--sl-green-100);border:1px solid var(--sl-border);border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;color:var(--sl-green-900);">
    <span style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;">green 100</span>
    <span style="font-family:var(--sl-font-mono);font-size:12px;">#E8F8E9</span>
  </div>
</div>
</body></html>
