<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0;padding:24px;font-family:var(--sl-font-sans);}
.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;border-radius:10px;padding:10px 16px;font-family:var(--sl-font-sans);font-weight:600;font-size:14px;cursor:pointer;line-height:1;}
.primary{background:var(--sl-brand);color:#fff;box-shadow:var(--sl-shadow-xs);}
.primary:hover{background:var(--sl-brand-hover);}
.accent{background:var(--sl-accent);color:#fff;box-shadow:var(--sl-shadow-xs);}
.accent:hover{background:var(--sl-accent-hover);}
.secondary{background:#fff;border-color:var(--sl-border-strong);color:var(--sl-fg);}
.secondary:hover{border-color:var(--sl-fg);background:var(--sl-bg-subtle);}
.ghost{background:transparent;color:var(--sl-fg);}
.ghost:hover{background:var(--sl-ink-100);}
.danger{background:var(--sl-danger-500);color:#fff;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
.tag{font-family:var(--sl-font-mono);font-size:11px;color:var(--sl-fg-subtle);width:64px;}
</style></head>
<body>
<div class="row"><span class="tag">primary</span>
  <button class="btn primary">Schedule inspection</button>
  <button class="btn primary" disabled style="opacity:.5;cursor:not-allowed;">Disabled</button>
</div>
<div class="row"><span class="tag">accent</span>
  <button class="btn accent">Start free trial</button>
  <button class="btn accent">Get a demo</button>
</div>
<div class="row"><span class="tag">secondary</span>
  <button class="btn secondary">View report</button>
  <button class="btn secondary">Export PDF</button>
</div>
<div class="row"><span class="tag">ghost</span>
  <button class="btn ghost">Cancel</button>
  <button class="btn ghost">Learn more</button>
</div>
<div class="row"><span class="tag">danger</span>
  <button class="btn danger">Flag violation</button>
</div>
</body></html>
