<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0;padding:24px;font-family:var(--sl-font-sans);}
.b{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;border:1px solid transparent;line-height:1.2;}
.dot{width:6px;height:6px;border-radius:50%;}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
</style></head>
<body>
<div class="row">
  <span class="b" style="background:var(--sl-success-100);color:var(--sl-success-700);border-color:var(--sl-green-300);"><span class="dot" style="background:var(--sl-success-500);"></span>Compliant</span>
  <span class="b" style="background:var(--sl-warning-100);color:var(--sl-warning-700);border-color:#FCD34D;"><span class="dot" style="background:var(--sl-warning-500);"></span>Expiring · 14 days</span>
  <span class="b" style="background:var(--sl-danger-100);color:var(--sl-danger-700);border-color:#FECACA;"><span class="dot" style="background:var(--sl-danger-500);"></span>Violation</span>
  <span class="b" style="background:var(--sl-info-100);color:var(--sl-info-700);border-color:var(--sl-navy-200);"><span class="dot" style="background:var(--sl-info-500);"></span>Pending review</span>
</div>
<div class="row">
  <span class="b" style="background:var(--sl-ink-100);color:var(--sl-ink-800);border-color:var(--sl-border);">Draft</span>
  <span class="b" style="background:var(--sl-navy-700);color:#fff;">Scheduled</span>
  <span class="b" style="background:var(--sl-green-600);color:#fff;">Closed</span>
  <span class="b" style="background:var(--sl-hivis-yellow);color:var(--sl-ink-900);letter-spacing:.04em;text-transform:uppercase;">Alarm</span>
</div>
<div class="row" style="margin-top:6px;">
  <span class="b" style="background:#fff;border-color:var(--sl-border-strong);color:var(--sl-fg-muted);font-family:var(--sl-font-mono);">29 CFR 1910.147</span>
  <span class="b" style="background:#fff;border-color:var(--sl-border-strong);color:var(--sl-fg-muted);font-family:var(--sl-font-mono);">1926.501</span>
</div>
</body></html>
