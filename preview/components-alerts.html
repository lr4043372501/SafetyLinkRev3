<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0;padding:20px;font-family:var(--sl-font-sans);}
.banner{display:flex;align-items:flex-start;gap:12px;border:1px solid;border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.banner .icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;color:#fff;}
.banner .ttl{font-weight:700;font-size:14px;line-height:1.3;}
.banner .msg{font-size:13px;line-height:1.45;margin-top:2px;color:var(--sl-fg-muted);}
</style></head>
<body>
<div class="banner" style="background:var(--sl-success-100);border-color:var(--sl-green-300);">
  <div class="icon" style="background:var(--sl-success-500);">✓</div>
  <div><div class="ttl" style="color:var(--sl-success-700);">Inspection closed</div><div class="msg">All findings resolved. Audit log updated.</div></div>
</div>
<div class="banner" style="background:var(--sl-warning-100);border-color:#FCD34D;">
  <div class="icon" style="background:var(--sl-warning-500);">!</div>
  <div><div class="ttl" style="color:var(--sl-warning-700);">7 trainings expire this month</div><div class="msg">Schedule recerts before May 11 to keep the site compliant.</div></div>
</div>
<div class="banner" style="background:var(--sl-danger-100);border-color:#FECACA;">
  <div class="icon" style="background:var(--sl-danger-500);">!</div>
  <div><div class="ttl" style="color:var(--sl-danger-700);">Open violation · fall protection</div><div class="msg">Reported on Yard 4 today at 09:14. An expert is reviewing your case.</div></div>
</div>
</body></html>
