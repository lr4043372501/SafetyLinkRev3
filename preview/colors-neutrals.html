<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0;padding:24px;}</style></head>
<body>
<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:8px;font-family:var(--sl-font-sans);">
  <div style="aspect-ratio:1;background:var(--sl-ink-900);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;font-size:10px;font-family:var(--sl-font-mono);">900</div>
  <div style="aspect-ratio:1;background:var(--sl-ink-800);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;font-size:10px;font-family:var(--sl-font-mono);">800</div>
  <div style="aspect-ratio:1;background:var(--sl-ink-700);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;font-size:10px;font-family:var(--sl-font-mono);">700</div>
  <div style="aspect-ratio:1;background:var(--sl-ink-600);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;font-size:10px;font-family:var(--sl-font-mono);">600</div>
  <div style="aspect-ratio:1;background:var(--sl-ink-500);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;font-size:10px;font-family:var(--sl-font-mono);">500</div>
  <div style="aspect-ratio:1;background:var(--sl-ink-400);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;font-size:10px;font-family:var(--sl-font-mono);">400</div>
  <div style="aspect-ratio:1;background:var(--sl-ink-300);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--sl-ink-900);font-size:10px;font-family:var(--sl-font-mono);">300</div>
  <div style="aspect-ratio:1;background:var(--sl-ink-200);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--sl-ink-900);font-size:10px;font-family:var(--sl-font-mono);">200</div>
  <div style="aspect-ratio:1;background:var(--sl-ink-100);border:1px solid var(--sl-border);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--sl-ink-900);font-size:10px;font-family:var(--sl-font-mono);">100</div>
  <div style="aspect-ratio:1;background:var(--sl-ink-050);border:1px solid var(--sl-border);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--sl-ink-900);font-size:10px;font-family:var(--sl-font-mono);">050</div>
  <div style="aspect-ratio:1;background:#fff;border:1px solid var(--sl-border);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end;color:var(--sl-ink-900);font-size:10px;font-family:var(--sl-font-mono);">white</div>
</div>
<div style="margin-top:14px;display:flex;gap:8px;font-family:var(--sl-font-sans);font-size:13px;color:var(--sl-fg-muted);">
  <span><b style="color:var(--sl-fg);">ink</b> · cool slate neutrals (never warm beige)</span>
</div>
</body></html>
