<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0;padding:24px;}
.row{display:flex;align-items:baseline;gap:18px;padding:6px 0;border-bottom:1px dashed var(--sl-ink-200);}
.row:last-child{border-bottom:0;}
.label{font-family:var(--sl-font-mono);font-size:11px;color:var(--sl-fg-subtle);width:130px;flex-shrink:0;}
</style></head>
<body>
<div style="font-family:var(--sl-font-sans);color:var(--sl-fg);">
  <div class="row"><span class="label">H1 · 800 · 60</span><span style="font-size:38px;font-weight:800;letter-spacing:-.02em;line-height:1.1;">Stop chasing OSHA paperwork</span></div>
  <div class="row"><span class="label">H2 · 700 · 38</span><span style="font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1.15;">Built for the field</span></div>
  <div class="row"><span class="label">H3 · 700 · 24</span><span style="font-size:22px;font-weight:700;line-height:1.25;">Inspections that finish themselves</span></div>
  <div class="row"><span class="label">H4 · 600 · 20</span><span style="font-size:18px;font-weight:600;">Audit-ready, every shift</span></div>
  <div class="row"><span class="label">Eyebrow · 600 · 14</span><span style="font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--sl-accent-hover);">Why SafetyLink</span></div>
</div>
</body></html>
