<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0;padding:24px;font-family:var(--sl-font-sans);}
.row{display:flex;gap:10px;align-items:flex-end;}
.r{background:var(--sl-navy-100);border:1px solid var(--sl-navy-200);width:70px;height:70px;display:flex;align-items:center;justify-content:center;color:var(--sl-navy-700);font-family:var(--sl-font-mono);font-size:11px;}
.cap{font-family:var(--sl-font-mono);font-size:11px;color:var(--sl-fg-subtle);text-align:center;margin-top:6px;}
.col{display:flex;flex-direction:column;}
</style></head>
<body>
<div class="row">
  <div class="col"><div class="r" style="border-radius:4px;">xs</div><div class="cap">4</div></div>
  <div class="col"><div class="r" style="border-radius:6px;">sm</div><div class="cap">6</div></div>
  <div class="col"><div class="r" style="border-radius:10px;">md</div><div class="cap">10</div></div>
  <div class="col"><div class="r" style="border-radius:14px;">lg</div><div class="cap">14</div></div>
  <div class="col"><div class="r" style="border-radius:20px;">xl</div><div class="cap">20</div></div>
  <div class="col"><div class="r" style="border-radius:28px;">2xl</div><div class="cap">28</div></div>
  <div class="col"><div class="r" style="border-radius:999px;">pill</div><div class="cap">∞</div></div>
</div>
<div style="margin-top:14px;color:var(--sl-fg-subtle);font-size:12px;">md (10) is the default for cards, inputs, buttons</div>
</body></html>
