<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:transparent;margin:0;padding:24px;}
  .card{font-family:var(--sl-font-sans);}
  .row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap;}
</style></head>
<body><div class="card">
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
  <div style="aspect-ratio:1.4;background:var(--sl-navy-900);border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;">
    <span style="font-size:11px;opacity:.7;letter-spacing:.06em;text-transform:uppercase;">navy 900</span>
    <span style="font-family:var(--sl-font-mono);font-size:12px;">#0B2238</span>
  </div>
  <div style="aspect-ratio:1.4;background:var(--sl-navy-700);border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;">
    <span style="font-size:11px;opacity:.85;letter-spacing:.06em;text-transform:uppercase;">navy 700 · brand</span>
    <span style="font-family:var(--sl-font-mono);font-size:12px;">#14375B</span>
  </div>
  <div style="aspect-ratio:1.4;background:var(--sl-navy-500);border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;">
    <span style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;">navy 500</span>
    <span style="font-family:var(--sl-font-mono);font-size:12px;">#2E6196</span>
  </div>
  <div style="aspect-ratio:1.4;background:var(--sl-navy-200);border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;color:var(--sl-navy-900);">
    <span style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;">navy 200</span>
    <span style="font-family:var(--sl-font-mono);font-size:12px;">#C5D3E3</span>
  </div>
  <div style="aspect-ratio:1.4;background:var(--sl-navy-050);border:1px solid var(--sl-border);border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;color:var(--sl-navy-900);">
    <span style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;">navy 050</span>
    <span style="font-family:var(--sl-font-mono);font-size:12px;">#F2F5F9</span>
  </div>
</div>
</div></body></html>
