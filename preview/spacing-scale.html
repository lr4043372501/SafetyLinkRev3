<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">

.px{font-family:var(--sl-font-mono);font-size:11px;color:var(--sl-fg-subtle);width:46px;text-align:right;}
</style></head>
<body>
<div style="color:var(--sl-fg);">

<div class="row"><span class="label">space-2</span><div class="bar" style="width:8px;"></div><span class="px">8px</span></div>

</div>
<div style="margin-top:8px;color:var(--sl-fg-subtle);font-size:12px;">4pt base · cards 24 · sections 96</div>
</body></html>
