<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SafetyLink — Marketing UI Kit</title>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div id="app"></div>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="LogosBand.jsx"></script>
<script type="text/babel" src="Features.jsx"></script>
<script type="text/babel" src="Stats.jsx"></script>
<script type="text/babel" src="Story.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="CTA.jsx"></script>
<script type="text/babel" src="SignupModal.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
function App() {
  const [signup, setSignup] = useState(false);
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
  return (<>
    <MarketingNav onSignup={()=>setSignup(true)} />
    <MarketingHero onSignup={()=>setSignup(true)} />
    <MarketingLogosBand />
    <MarketingFeatures />
    <MarketingStats />
    <MarketingStory />
    <MarketingPricing onSignup={()=>setSignup(true)} />
    <MarketingCTA onSignup={()=>setSignup(true)} />
    <MarketingFooter />
    {signup && <SignupModal onClose={()=>setSignup(false)} />}
  </>);
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
